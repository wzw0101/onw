name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ vars.ACR_REGISTRY }} -u "${{ vars.ACR_USERNAME }}" --password-stdin

      - name: Build images
        run: docker compose build

      - name: Tag and push backend
        run: |
          docker tag onw-backend:latest ${{ vars.ACR_REGISTRY }}/onw-backend:latest
          docker push ${{ vars.ACR_REGISTRY }}/onw-backend:latest

      - name: Tag and push frontend
        run: |
          docker tag onw-frontend:latest ${{ vars.ACR_REGISTRY }}/onw-frontend:latest
          docker push ${{ vars.ACR_REGISTRY }}/onw-frontend:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/onw
            docker compose -f docker-compose.remote.yml pull
            docker compose -f docker-compose.remote.yml up -d
            docker image prune -f
