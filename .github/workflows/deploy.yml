name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ vars.ACR_REGISTRY }} -u "${{ vars.ACR_USERNAME }}" --password-stdin

      - name: Build and push images
        env:
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
        run: |
          docker compose build
          docker compose push

      - name: Deploy compose file and nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,nginx.conf"
          target: "/opt/onw/"

      - name: Write .env on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cat > /opt/onw/.env << 'EOF'
            ACR_REGISTRY=${{ vars.ACR_REGISTRY }}
            EOF

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/onw
            docker compose pull
            docker compose up -d
            docker image prune -f
