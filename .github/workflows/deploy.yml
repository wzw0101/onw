name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Target registry environment'
        required: true
        default: 'acr'
        type: choice
        options:
          - dockerhub
          - acr

jobs:
  build-backend:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target || 'acr' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ vars.NAMESPACE }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Get Git commit SHA
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build and push backend
        env:
          REGISTRY: ${{ vars.REGISTRY }}
          NAMESPACE: ${{ vars.NAMESPACE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          MAVEN_SETTINGS: settings-ci.xml
        run: |
          docker buildx build \
            --cache-from type=gha,scope=backend \
            --cache-to type=gha,mode=max,scope=backend \
            --build-arg MAVEN_SETTINGS=$MAVEN_SETTINGS \
            -t $REGISTRY/$NAMESPACE/onw-backend:$IMAGE_TAG \
            --push \
            ./backend

  build-frontend:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target || 'acr' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ vars.NAMESPACE }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Get Git commit SHA
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build and push frontend
        env:
          REGISTRY: ${{ vars.REGISTRY }}
          NAMESPACE: ${{ vars.NAMESPACE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          docker buildx build \
            --cache-from type=gha,scope=frontend \
            --cache-to type=gha,mode=max,scope=frontend \
            -t $REGISTRY/$NAMESPACE/onw-frontend:$IMAGE_TAG \
            --push \
            ./frontend

  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target || 'acr' }}
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Git commit SHA
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Deploy compose file and nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,nginx.conf"
          target: "/opt/onw/"

      - name: Write .env on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cat > /opt/onw/.env << 'EOF'
            REGISTRY=${{ vars.REGISTRY }}
            NAMESPACE=${{ vars.NAMESPACE }}
            IMAGE_TAG=${{ env.IMAGE_TAG }}
            EOF

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ vars.REGISTRY }} -u ${{ vars.NAMESPACE }} --password-stdin
            cd /opt/onw
            docker compose pull
            docker compose up -d
            docker image prune -f
