name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Target registry environment'
        required: true
        default: 'acr'
        type: choice
        options:
          - dockerhub
          - acr

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target || 'acr' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-buildx-${{ runner.os }}-${{ hashFiles('**/Dockerfile', '**/package-lock.json', '**/pom.xml') }}
          restore-keys: |
            docker-buildx-${{ runner.os }}-

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ vars.NAMESPACE }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Get Git commit SHA
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build and push images
        env:
          REGISTRY: ${{ vars.REGISTRY }}
          NAMESPACE: ${{ vars.NAMESPACE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          MAVEN_SETTINGS: settings-ci.xml
        run: |
          # 确保缓存目录存在
          mkdir -p /tmp/.buildx-cache /tmp/.buildx-cache-new

          # 构建 backend
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache/backend \
            --cache-to type=local,dest=/tmp/.buildx-cache-new/backend,mode=max \
            --build-arg MAVEN_SETTINGS=$MAVEN_SETTINGS \
            -t $REGISTRY/$NAMESPACE/onw-backend:$IMAGE_TAG \
            --push \
            ./backend

          # 构建 frontend
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache/frontend \
            --cache-to type=local,dest=/tmp/.buildx-cache-new/frontend,mode=max \
            -t $REGISTRY/$NAMESPACE/onw-frontend:$IMAGE_TAG \
            -t $REGISTRY/$NAMESPACE/onw-frontend:$IMAGE_TAG \
            --push \
            ./frontend

          # 合并缓存
          for svc in backend frontend; do
            if [ -d /tmp/.buildx-cache-new/$svc ]; then
              rm -rf /tmp/.buildx-cache/$svc
              mv /tmp/.buildx-cache-new/$svc /tmp/.buildx-cache/$svc
            fi
          done
          rm -rf /tmp/.buildx-cache-new

      - name: Deploy compose file and nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,nginx.conf"
          target: "/opt/onw/"

      - name: Write .env on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cat > /opt/onw/.env << 'EOF'
            REGISTRY=${{ vars.REGISTRY }}
            NAMESPACE=${{ vars.NAMESPACE }}
            IMAGE_TAG=${{ env.IMAGE_TAG }}
            EOF

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ vars.REGISTRY }} -u ${{ vars.NAMESPACE }} --password-stdin
            cd /opt/onw
            docker compose pull
            docker compose up -d
            docker image prune -f
