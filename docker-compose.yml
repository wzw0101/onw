# 本地开发: docker compose up --build
services:
  backend:
    build: ./onw-backend
    restart: unless-stopped
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
    entrypoint: ["sh", "-c", "java $JAVA_OPTS -jar app.jar"]

  frontend:
    build:
      context: ./onw-frontend
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-localhost:8080}"
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
