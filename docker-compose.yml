# 本地开发: docker compose up --build
# 服务器部署: docker compose pull && docker compose up -d (需配置 .env)
#
# 环境变量:
#   REGISTRY             - 镜像仓库服务地址（必填），如 docker.io、ghcr.io、crpi-xxx.aliyuncs.com
#   NAMESPACE            - 镜像命名空间/用户名（必填），如 wzw9807
#   IMAGE_TAG            - 镜像标签，默认为 latest，CI 建议使用 Git commit hash
#   NEXT_PUBLIC_API_URL  - 前端 API 地址，默认 localhost:8080

services:
  backend:
    build:
      context: ./backend
      args:
        MAVEN_SETTINGS: ${MAVEN_SETTINGS:-maven-settings.xml}
    image: ${REGISTRY}/${NAMESPACE}/onw-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
    entrypoint: ["sh", "-c", "java $JAVA_OPTS -jar app.jar"]

  frontend:
    build:
      context: ./frontend
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-localhost:8080}"
    image: ${REGISTRY}/${NAMESPACE}/onw-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
